apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-api-dev
  namespace: gitops
spec:
  project: default
  revisionHistoryLimit: 5
  # Shown at the top of the app in Argo CD (Summary). Updated by infra Terraform CI.
  info:
    - name: GCP buckets (Terraform)
      value: "cgk-999"
    - name: GCP VPC
      value: "-"
    - name: GCP subnet
      value: "-"
  source:
    repoURL: https://github.com/gopalakrishnachennu/platform.git
    targetRevision: main
    path: gitops/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
