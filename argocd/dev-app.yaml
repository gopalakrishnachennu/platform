# =============================================================================
# Argo CD Application — platform-api-dev
# -----------------------------------------------------------------------------
# Purpose:    Declares GitOps sync from this repo path → GKE namespace `dev`.
#             Argo reconciles cluster state to match gitops/overlays/dev on main.
# Prereq:     Set spec.source.repoURL to your fork/clone before kubectl apply.
# Note:       spec.info entries are updated by infra-terraform.yml from TF outputs.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-api-dev
  namespace: gitops
spec:
  project: default
  revisionHistoryLimit: 5
  info:
    - name: GCP buckets
      value: "-"
    - name: GCP VPC
      value: "-"
    - name: GCP subnet
      value: "-"
  source:
    repoURL: https://github.com/gopalakrishnachennu/platform.git
    targetRevision: main
    path: gitops/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
