# =============================================================================
# Argo CD Application — Google Managed Prometheus scrape configuration
# -----------------------------------------------------------------------------
# Depends on: Terraform stack infra/gke-monitoring/prometheus (GMP enabled).
# After sync, GMP collectors scrape PodMonitoring targets; metrics appear in
# Google Cloud Console → Observability → Metrics (Prometheus / Kubernetes).
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-gmp
  namespace: gitops
spec:
  project: default
  revisionHistoryLimit: 5
  source:
    repoURL: https://github.com/gopalakrishnachennu/platform.git
    targetRevision: main
    path: gitops/monitoring-gmp
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
