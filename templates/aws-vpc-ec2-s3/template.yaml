apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: aws-vpc-ec2-s3
  title: AWS VPC + EC2 + S3 (Terraform)
  description: Generate Terraform for a basic VPC, EC2 instance, and S3 bucket.
  tags:
    - terraform
    - aws
    - infrastructure
spec:
  owner: user:default/guest
  type: infrastructure

  parameters:
    - title: Basic Info
      required:
        - projectName
        - awsRegion
        - environment
      properties:
        projectName:
          title: Project name
          type: string
          description: Used in naming resources.
          pattern: "^[a-zA-Z0-9-]+$"
        awsRegion:
          title: AWS region
          type: string
          default: us-east-1
        environment:
          title: Environment
          type: string
          enum:
            - dev
            - staging
            - production

    - title: Network and Compute
      required:
        - vpcCidr
        - subnetCidr
        - instanceType
      properties:
        vpcCidr:
          title: VPC CIDR
          type: string
          default: 10.0.0.0/16
        subnetCidr:
          title: Public subnet CIDR
          type: string
          default: 10.0.1.0/24
        instanceType:
          title: EC2 instance type
          type: string
          default: t3.micro
        keyPairName:
          title: EC2 key pair name (optional)
          type: string
          default: ""

    - title: Storage
      required:
        - s3BucketName
      properties:
        s3BucketName:
          title: S3 bucket name
          type: string
          description: Must be globally unique in AWS.
          pattern: "^[a-z0-9.-]{3,63}$"
        enableVersioning:
          title: Enable bucket versioning
          type: boolean
          default: true

  steps:
    - id: fetch-template
      name: Generate Terraform files
      action: fetch:template
      input:
        url: ./skeleton
        values:
          projectName: ${{ parameters.projectName }}
          awsRegion: ${{ parameters.awsRegion }}
          environment: ${{ parameters.environment }}
          vpcCidr: ${{ parameters.vpcCidr }}
          subnetCidr: ${{ parameters.subnetCidr }}
          instanceType: ${{ parameters.instanceType }}
          keyPairName: ${{ parameters.keyPairName }}
          s3BucketName: ${{ parameters.s3BucketName }}
          enableVersioning: ${{ parameters.enableVersioning }}

    - id: write-catalog
      name: Add Backstage entity descriptor
      action: catalog:write
      input:
        entity:
          apiVersion: backstage.io/v1alpha1
          kind: Component
          metadata:
            name: ${{ parameters.projectName }}-infra
            description: Terraform module generated from Backstage template
            tags:
              - terraform
              - aws
          spec:
            type: infrastructure
            owner: user:default/guest
            lifecycle: experimental

  output:
    text:
      - title: Generated
        content: Terraform files generated. Download/export and run terraform init/plan/apply.
