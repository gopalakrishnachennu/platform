apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: gcp-storage-bucket
  title: GCP Cloud Storage Bucket (Terraform)
  description: Generate Terraform for a Google Cloud Storage bucket.
  tags:
    - terraform
    - gcp
    - cloud-storage
spec:
  owner: user:default/guest
  type: infrastructure

  parameters:
    - title: GitHub destination
      required:
        - repoOwner
        - repoName
      properties:
        repoOwner:
          title: GitHub owner
          type: string
          default: gopalakrishnachennu
        repoName:
          title: GitHub repository
          type: string
          default: platform
    - title: Bucket configuration
      required:
        - gcpProjectId
        - bucketName
        - gcpRegion
      properties:
        gcpProjectId:
          title: GCP project ID
          type: string
          default: chennu-platform
        bucketName:
          title: Cloud Storage bucket name
          type: string
          pattern: "^[a-z0-9.-]{3,63}$"
        gcpRegion:
          title: GCP region
          type: string
          default: us-central1
        enableVersioning:
          title: Enable versioning
          type: boolean
          default: true
        forceDestroy:
          title: Force destroy bucket (delete objects on destroy)
          type: boolean
          default: false

  steps:
    - id: fetch-template
      name: Generate Terraform files
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: ./infra/gcp-storage/${{ parameters.bucketName }}
        values:
          gcpProjectId: ${{ parameters.gcpProjectId }}
          bucketName: ${{ parameters.bucketName }}
          gcpRegion: ${{ parameters.gcpRegion }}
          enableVersioning: ${{ parameters.enableVersioning }}
          forceDestroy: ${{ parameters.forceDestroy }}

    - id: open-pr
      name: Create pull request
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=${{ parameters.repoOwner }}&repo=${{ parameters.repoName }}
        branchName: infra-gcs-${{ parameters.bucketName }}
        sourcePath: ./infra/gcp-storage/${{ parameters.bucketName }}
        targetPath: infra/gcp-storage/${{ parameters.bucketName }}
        title: "infra: provision gcs bucket ${{ parameters.bucketName }}"
        description: |
          Auto-generated by Backstage.
          - Resource: GCP Cloud Storage bucket
          - Bucket: ${{ parameters.bucketName }}
          - Region: ${{ parameters.gcpRegion }}
          - Project: ${{ parameters.gcpProjectId }}

  output:
    links:
      - title: Open Pull Request
        url: ${{ steps.open-pr.output.remoteUrl }}
    text:
      - title: Provision flow started
        content: Pull request created. Terraform plan runs on PR, and terraform apply runs automatically after merge to main.
