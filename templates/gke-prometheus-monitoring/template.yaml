# =============================================================================
# Backstage Software Template — GKE Prometheus Monitoring (Argo CD)
# -----------------------------------------------------------------------------
# Purpose:    Creates an Argo CD Application that deploys kube-prometheus-stack
#             via Helm and configures a Google Cloud Monitoring datasource in Grafana.
# Flow:       Backstage → PR in argocd/ → merge to main → workflow applies app CR.
# =============================================================================
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: gke-prometheus-monitoring
  title: GKE Prometheus + Cloud Monitoring (Argo CD)
  description: Install kube-prometheus-stack on GKE via Argo CD and preconfigure Grafana Cloud Monitoring datasource.
  tags:
    - monitoring
    - prometheus
    - grafana
    - gke
    - argocd
spec:
  owner: user:default/guest
  type: infrastructure

  parameters:
    - title: GitHub destination
      required:
        - repoOwner
        - repoName
      properties:
        repoOwner:
          title: GitHub owner
          type: string
        repoName:
          title: GitHub repository
          type: string
    - title: Monitoring app configuration
      required:
        - gcpProjectId
        - chartVersion
      properties:
        gcpProjectId:
          title: GCP project ID (for Grafana Cloud Monitoring datasource)
          type: string
        chartVersion:
          title: kube-prometheus-stack chart version
          type: string
        appName:
          title: Argo CD Application name
          type: string
          default: monitoring-prometheus
        namespace:
          title: Kubernetes namespace
          type: string
          default: monitoring
        grafanaAdminPassword:
          title: Grafana admin password
          type: string
          default: admin123

  steps:
    - id: fetch-template
      name: Generate Argo CD application manifest
      action: fetch:template
      input:
        # Only Helm Application YAML — do not copy Terraform or GMP CRDs into argocd/
        url: ./skeleton/argocd
        targetPath: ./argocd
        values:
          gcpProjectId: ${{ parameters.gcpProjectId }}
          chartVersion: ${{ parameters.chartVersion }}
          appName: ${{ parameters.appName }}
          namespace: ${{ parameters.namespace }}
          grafanaAdminPassword: ${{ parameters.grafanaAdminPassword }}

    - id: open-pr
      name: Create pull request
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=${{ parameters.repoOwner }}&repo=${{ parameters.repoName }}
        branchName: monitoring-prometheus-${{ parameters.appName }}
        sourcePath: ./argocd
        targetPath: argocd
        title: "monitoring: install Prometheus stack (${{ parameters.appName }})"
        description: |
          Auto-generated by Backstage.
          - Deploys kube-prometheus-stack via Argo CD
          - App: ${{ parameters.appName }}
          - Namespace: ${{ parameters.namespace }}
          - Chart version: ${{ parameters.chartVersion }}
          - GCP project datasource: ${{ parameters.gcpProjectId }}

  output:
    links:
      - title: Open Pull Request
        url: ${{ steps.open-pr.output.remoteUrl }}
    text:
      - title: Monitoring flow started
        content: Pull request created. Merge to main to apply the Argo CD Application and install Prometheus/Grafana.
