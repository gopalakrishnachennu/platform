# =============================================================================
# Backstage Software Template — Prometheus monitoring on GKE (Google Managed Prometheus)
# -----------------------------------------------------------------------------
# Purpose:    Scaffolds infra/gke-monitoring/<cluster>/ and opens a GitHub PR.
# Pipeline:   Merge → infra-terraform.yml applies Terraform + kubectl manifests.
# =============================================================================
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: gke-prometheus-monitoring
  title: GKE Prometheus Monitoring → Cloud Monitoring (GMP)
  description: Enable Google Managed Prometheus on a GKE cluster and deploy PodMonitoring CRDs to scrape metrics into Google Cloud Monitoring.
  tags:
    - terraform
    - gcp
    - prometheus
    - monitoring
    - gke
spec:
  owner: user:default/guest
  type: infrastructure

  parameters:
    - title: GitHub destination
      required:
        - repoOwner
        - repoName
      properties:
        repoOwner:
          title: GitHub owner
          type: string
        repoName:
          title: GitHub repository
          type: string
    - title: GKE cluster & monitoring configuration
      required:
        - gcpProjectId
        - gcpRegion
        - clusterName
      properties:
        gcpProjectId:
          title: GCP project ID
          type: string
        gcpRegion:
          title: GCP region
          type: string
        clusterName:
          title: GKE cluster name
          type: string
          pattern: "^[a-z]([-a-z0-9]*[a-z0-9])?$"
        monitoringNamespace:
          title: Kubernetes namespace for monitoring resources
          type: string
          default: monitoring
          pattern: "^[a-z]([-a-z0-9]*[a-z0-9])?$"
        scrapeInterval:
          title: Prometheus scrape interval
          type: string
          default: "30s"
          enum:
            - "15s"
            - "30s"
            - "60s"
        enableNodeExporter:
          title: Deploy node-exporter DaemonSet for host-level metrics
          type: boolean
          default: true

  steps:
    - id: fetch-template
      name: Generate Terraform + Kubernetes manifests
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: ./infra/gke-monitoring/${{ parameters.clusterName }}
        values:
          gcpProjectId: ${{ parameters.gcpProjectId }}
          gcpRegion: ${{ parameters.gcpRegion }}
          clusterName: ${{ parameters.clusterName }}
          monitoringNamespace: ${{ parameters.monitoringNamespace }}
          scrapeInterval: ${{ parameters.scrapeInterval }}
          enableNodeExporter: ${{ parameters.enableNodeExporter }}

    - id: open-pr
      name: Create pull request
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=${{ parameters.repoOwner }}&repo=${{ parameters.repoName }}
        branchName: infra-monitoring-${{ parameters.clusterName }}
        sourcePath: ./infra/gke-monitoring/${{ parameters.clusterName }}
        targetPath: infra/gke-monitoring/${{ parameters.clusterName }}
        title: "infra: enable Prometheus monitoring on ${{ parameters.clusterName }}"
        description: |
          Auto-generated by Backstage.
          - Resource: Google Managed Prometheus (GMP) + PodMonitoring CRDs
          - Cluster: ${{ parameters.clusterName }}
          - Namespace: ${{ parameters.monitoringNamespace }}
          - Scrape interval: ${{ parameters.scrapeInterval }}
          - Node exporter: ${{ parameters.enableNodeExporter }}
          - Region: ${{ parameters.gcpRegion }}
          - Project: ${{ parameters.gcpProjectId }}

  output:
    links:
      - title: Open Pull Request
        url: ${{ steps.open-pr.output.remoteUrl }}
    text:
      - title: Monitoring setup started
        content: |
          Pull request created. After merge:
          1. Terraform enables Google Managed Prometheus on the GKE cluster.
          2. PodMonitoring CRDs are applied to start scraping metrics.
          3. Metrics appear in Google Cloud Monitoring under "Prometheus Target" > "prometheus.googleapis.com".
