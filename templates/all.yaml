# =============================================================================
# Backstage Location — template catalog registration
# -----------------------------------------------------------------------------
# Purpose:    Lists GitHub URLs of template.yaml files for Backstage catalog.
# Operator:   Set spec.targets (and register this file in idp/backstage-values-dev.yaml).
# Note:       Use github.com/blob/ URLs (not raw.githubusercontent.com) so the
#             scaffolder's GitHub integration resolves correctly for fetch:template.
# =============================================================================
apiVersion: backstage.io/v1alpha1
kind: Location
metadata:
  name: platform-template-locations
spec:
  type: url
  rules:
    - allow: [Template]
  targets:
    - https://github.com/gopalakrishnachennu/platform/blob/main/templates/gcp-storage-bucket/template.yaml
    - https://github.com/gopalakrishnachennu/platform/blob/main/templates/gcp-vpc-network/template.yaml
    - https://github.com/gopalakrishnachennu/platform/blob/main/templates/gke-prometheus-monitoring/template.yaml
