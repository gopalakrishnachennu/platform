apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: gcp-vpc-network
  title: GCP VPC + Subnet + Firewall (Terraform)
  description: Generate Terraform for a custom VPC network, subnet, and baseline firewall rules.
  tags:
    - terraform
    - gcp
    - vpc
    - network
spec:
  owner: user:default/guest
  type: infrastructure

  parameters:
    - title: GitHub destination
      required:
        - repoOwner
        - repoName
      properties:
        repoOwner:
          title: GitHub owner
          type: string
        repoName:
          title: GitHub repository
          type: string
    - title: GCP network configuration
      required:
        - gcpProjectId
        - gcpRegion
        - networkName
        - subnetName
        - subnetCidr
        - sourceCidr
      properties:
        gcpProjectId:
          title: GCP project ID
          type: string
        gcpRegion:
          title: GCP region
          type: string
        networkName:
          title: VPC network name
          type: string
          pattern: "^[a-z]([-a-z0-9]*[a-z0-9])?$"
        subnetName:
          title: Subnet name
          type: string
          pattern: "^[a-z]([-a-z0-9]*[a-z0-9])?$"
        subnetCidr:
          title: Subnet CIDR range
          type: string
        sourceCidr:
          title: Allowed source CIDR for SSH/HTTP
          type: string

  steps:
    - id: fetch-template
      name: Generate Terraform files
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: ./infra/gcp-vpc/${{ parameters.networkName }}
        values:
          gcpProjectId: ${{ parameters.gcpProjectId }}
          gcpRegion: ${{ parameters.gcpRegion }}
          networkName: ${{ parameters.networkName }}
          subnetName: ${{ parameters.subnetName }}
          subnetCidr: ${{ parameters.subnetCidr }}
          sourceCidr: ${{ parameters.sourceCidr }}

    - id: open-pr
      name: Create pull request
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=${{ parameters.repoOwner }}&repo=${{ parameters.repoName }}
        branchName: infra-vpc-${{ parameters.networkName }}
        sourcePath: ./infra/gcp-vpc/${{ parameters.networkName }}
        targetPath: infra/gcp-vpc/${{ parameters.networkName }}
        title: "infra: provision vpc ${{ parameters.networkName }}"
        description: |
          Auto-generated by Backstage.
          - Resource: GCP VPC + subnet + firewall
          - Network: ${{ parameters.networkName }}
          - Subnet: ${{ parameters.subnetName }}
          - Region: ${{ parameters.gcpRegion }}
          - Project: ${{ parameters.gcpProjectId }}

  output:
    links:
      - title: Open Pull Request
        url: ${{ steps.open-pr.output.remoteUrl }}
    text:
      - title: Provision flow started
        content: Pull request created. Terraform plan runs on PR, and terraform apply runs automatically after merge to main.
