# Optional overrides for kube-prometheus-stack (Grafana).
# Install via Helm in Cloud Shell or CI — see docs/OPERATIONS.md
#
# PagerDuty / Slack / webhooks: Grafana UI → Alerting → Contact points (see docs/OPERATIONS.md)

grafana:
  grafana.ini:
    unified_alerting:
      enabled: true
    alerting:
      enabled: true
