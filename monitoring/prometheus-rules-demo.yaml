# OPTIONAL demo only — fires continuously. Apply manually for notification routing tests.
#   kubectl apply -f monitoring/prometheus-rules-demo.yaml
# Remove after demo:
#   kubectl delete prometheusrule platform-demo-alerts -n monitoring
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: platform-demo-alerts
  namespace: monitoring
spec:
  groups:
    - name: demo.notifications
      rules:
        - alert: DemoNotificationRouting
          expr: vector(1) > 0
          for: 1m
          labels:
            severity: critical
            demo: "true"
          annotations:
            summary: "Demo alert — delete this PrometheusRule after the demo"
            description: "Used to test Alertmanager / PagerDuty / webhook routing."
