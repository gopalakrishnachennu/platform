# =============================================================================
# Google Managed Prometheus — PodMonitoring & ClusterPodMonitoring CRDs
# -----------------------------------------------------------------------------
# Purpose:    Define what Prometheus scrapes on the GKE cluster.
# Docs:       https://cloud.google.com/stackdriver/docs/managed-prometheus
# Apply:      kubectl apply -f prometheus.yaml
# =============================================================================

---
# ---------------------------------------------------------------------------
# PodMonitoring: scrape any pod in the monitoring namespace with the
# annotation prometheus.io/scrape: "true"
# ---------------------------------------------------------------------------
apiVersion: monitoring.googleapis.com/v1
kind: PodMonitoring
metadata:
  name: namespace-pod-metrics
  namespace: monitoring
  labels:
    app.kubernetes.io/managed-by: backstage
spec:
  selector:
    matchLabels: {}       # matches ALL pods in the namespace
  endpoints:
    - port: metrics       # named port "metrics", or use targetPort below
      interval: 30s
      path: /metrics
  targetLabels:
    metadata:
      - pod
      - container
      - namespace

---
# ---------------------------------------------------------------------------
# ClusterPodMonitoring: scrape kube-system components (kubelet, kube-dns, etc.)
# cluster-wide — no namespace restriction
# ---------------------------------------------------------------------------
apiVersion: monitoring.googleapis.com/v1
kind: ClusterPodMonitoring
metadata:
  name: kube-system-metrics
  labels:
    app.kubernetes.io/managed-by: backstage
spec:
  selector:
    matchLabels: {}
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
  targetLabels:
    metadata:
      - pod
      - container
      - namespace

---
# ---------------------------------------------------------------------------
# ClusterPodMonitoring: scrape pods annotated with prometheus.io/scrape=true
# across ALL namespaces
# ---------------------------------------------------------------------------
apiVersion: monitoring.googleapis.com/v1
kind: ClusterPodMonitoring
metadata:
  name: annotated-pod-metrics
  labels:
    app.kubernetes.io/managed-by: backstage
spec:
  selector:
    matchLabels: {}
  endpoints:
    - port: http-metrics
      interval: 30s
      path: /metrics
    - port: metrics
      interval: 30s
      path: /metrics
  targetLabels:
    metadata:
      - pod
      - container
      - namespace


---
# ---------------------------------------------------------------------------
# Node-exporter DaemonSet — host-level metrics (CPU, memory, disk, network)
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: prometheus-node-exporter
  namespace: monitoring
  labels:
    app: prometheus-node-exporter
    app.kubernetes.io/managed-by: backstage
spec:
  selector:
    matchLabels:
      app: prometheus-node-exporter
  template:
    metadata:
      labels:
        app: prometheus-node-exporter
    spec:
      hostPID: true
      hostNetwork: true
      containers:
        - name: node-exporter
          image: prom/node-exporter:v1.7.0
          args:
            - --path.procfs=/host/proc
            - --path.sysfs=/host/sys
            - --path.rootfs=/host/root
            - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
          ports:
            - name: metrics
              containerPort: 9100
              hostPort: 9100
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
            - name: root
              mountPath: /host/root
              readOnly: true
              mountPropagation: HostToContainer
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      tolerations:
        - operator: Exists
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        - name: root
          hostPath:
            path: /

---
# ---------------------------------------------------------------------------
# PodMonitoring: scrape node-exporter pods
# ---------------------------------------------------------------------------
apiVersion: monitoring.googleapis.com/v1
kind: PodMonitoring
metadata:
  name: node-exporter-metrics
  namespace: monitoring
  labels:
    app.kubernetes.io/managed-by: backstage
spec:
  selector:
    matchLabels:
      app: prometheus-node-exporter
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
  targetLabels:
    metadata:
      - pod
      - node

