# =============================================================================
# Kustomize overlay — gitops/overlays/dev
# -----------------------------------------------------------------------------
# Purpose:    Namespace `dev` + patches for the platform-api Deployment.
# Synced by:  Argo CD Application (argocd/dev-app.yaml) path: gitops/overlays/dev
# =============================================================================
namespace: dev

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: platform-api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
