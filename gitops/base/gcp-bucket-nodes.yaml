# One ConfigMap per Terraform-provisioned GCS bucket so names show in the Argo CD resource tree.
# Regenerated by .github/workflows/infra-terraform.yml on infra apply.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gcp-bucket-cgk-999
  labels:
    platform.dev/provisioned: gcp-storage
data:
  bucket_name: "cgk-999"
---
