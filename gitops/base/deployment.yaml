# =============================================================================
# Deployment — platform-api
# -----------------------------------------------------------------------------
# Purpose:    Runs the sample platform-api container (image tag updated by CI).
# Env:        Injects ConfigMap platform-runtime-config (Terraform outputs / placeholders).
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-api
  labels:
    app: platform-api
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: platform-api
  template:
    metadata:
      labels:
        app: platform-api
    spec:
      containers:
        - name: platform-api
          image: us-central1-docker.pkg.dev/chennu-platform/platform-images/platform-api:85490834458846ed51b848225499dd36469f7931
          envFrom:
            - configMapRef:
                name: platform-runtime-config
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
