# =============================================================================
# Service — platform-api
# -----------------------------------------------------------------------------
# Purpose:    In-cluster HTTP (port 80) → container port 8080 for platform-api pods.
# Access:     ClusterIP (use kubectl port-forward or add Ingress/LB for external).
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: platform-api
spec:
  selector:
    app: platform-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
