name: CI Cloud Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GCP_PROJECT_ID: chennu-platform
  GCP_REGION: us-central1
  ARTIFACT_REPO: platform-images
  IMAGE_NAME: demo-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image with Cloud Build (no local Docker)
        run: |
          IMAGE_URI="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPO}/${IMAGE_NAME}:${GITHUB_SHA}"
          BUILD_ID="$(gcloud builds submit --tag "${IMAGE_URI}" --async --format='value(metadata.build.id)' .)"
          echo "Started Cloud Build: ${BUILD_ID}"
          while true; do
            STATUS="$(gcloud builds describe "${BUILD_ID}" --format='value(status)')"
            echo "Cloud Build status: ${STATUS}"
            if [ "${STATUS}" = "SUCCESS" ]; then
              break
            fi
            if [ "${STATUS}" = "FAILURE" ] || [ "${STATUS}" = "INTERNAL_ERROR" ] || [ "${STATUS}" = "TIMEOUT" ] || [ "${STATUS}" = "CANCELLED" ] || [ "${STATUS}" = "EXPIRED" ]; then
              echo "Cloud Build failed with status: ${STATUS}"
              exit 1
            fi
            sleep 10
          done
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Patch image tag for dev overlay
        run: |
          sed -i.bak "s|image: .*|image: ${IMAGE_URI}|" gitops/base/deployment.yaml
          rm -f gitops/base/deployment.yaml.bak

      - name: Commit manifest update
        run: |
          if git diff --quiet; then
            echo "No manifest changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/base/deployment.yaml
          git commit -m "chore: update image tag to ${GITHUB_SHA}"
          git push
