name: Infra Terraform

on:
  pull_request:
    paths:
      - "infra/**/*.tf"
  push:
    branches:
      - main
    paths:
      - "infra/**/*.tf"
  workflow_dispatch:

env:
  GCP_PROJECT_ID: chennu-platform
  GCP_REGION: us-central1
  TF_STATE_BUCKET: chennu-platform-tf-state

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Ensure Terraform state bucket exists
        run: |
          gcloud storage buckets describe "gs://${TF_STATE_BUCKET}" --project "${GCP_PROJECT_ID}" >/dev/null 2>&1 || \
          gcloud storage buckets create "gs://${TF_STATE_BUCKET}" \
            --project "${GCP_PROJECT_ID}" \
            --location "${GCP_REGION}" \
            --uniform-bucket-level-access

      - name: Terraform plan for changed infra directories
        run: |
          set -euo pipefail
          mapfile -t TF_DIRS < <(git diff --name-only "origin/${{ github.base_ref }}...HEAD" | awk '/^infra\/.*\.tf$/ {sub(/\/[^/]+$/, "", $0); print}' | sort -u)
          if [ "${#TF_DIRS[@]}" -eq 0 ]; then
            echo "No changed Terraform directories in infra/."
            exit 0
          fi
          for dir in "${TF_DIRS[@]}"; do
            echo "Planning ${dir}"
            terraform -chdir="${dir}" init -input=false \
              -backend-config="bucket=${TF_STATE_BUCKET}" \
              -backend-config="prefix=${dir}"
            terraform -chdir="${dir}" validate
            terraform -chdir="${dir}" plan -input=false -no-color
          done

  apply:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Ensure Terraform state bucket exists
        run: |
          gcloud storage buckets describe "gs://${TF_STATE_BUCKET}" --project "${GCP_PROJECT_ID}" >/dev/null 2>&1 || \
          gcloud storage buckets create "gs://${TF_STATE_BUCKET}" \
            --project "${GCP_PROJECT_ID}" \
            --location "${GCP_REGION}" \
            --uniform-bucket-level-access

      - name: Terraform apply for changed infra directories
        run: |
          set -euo pipefail
          BEFORE_SHA="${{ github.event.before }}"
          if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            BEFORE_SHA="$(git rev-list --max-count=1 HEAD^)"
          fi
          mapfile -t TF_DIRS < <(git diff --name-only "${BEFORE_SHA}" "${GITHUB_SHA}" | awk '/^infra\/.*\.tf$/ {sub(/\/[^/]+$/, "", $0); print}' | sort -u)
          if [ "${#TF_DIRS[@]}" -eq 0 ]; then
            echo "No changed Terraform directories in infra/."
            exit 0
          fi
          for dir in "${TF_DIRS[@]}"; do
            echo "Applying ${dir}"
            terraform -chdir="${dir}" init -input=false \
              -backend-config="bucket=${TF_STATE_BUCKET}" \
              -backend-config="prefix=${dir}"
            terraform -chdir="${dir}" apply -input=false -auto-approve
          done

          # Argo CD only shows Kubernetes objects — GCS buckets live in GCP. Surface *all* bucket
          # names from every infra/gcp-storage stack so platform-runtime-config is a registry.
          GCP_STORAGE_BUCKETS=""
          GCP_STORAGE_BUCKET=""
          set +e
          for gcs_dir in infra/gcp-storage/*/; do
            [ -d "${gcs_dir}" ] || continue
            [ -f "${gcs_dir}main.tf" ] || continue
            echo "Collecting outputs from ${gcs_dir}"
            terraform -chdir="${gcs_dir}" init -input=false \
              -backend-config="bucket=${TF_STATE_BUCKET}" \
              -backend-config="prefix=${gcs_dir%/}" >/dev/null 2>&1
            bn="$(terraform -chdir="${gcs_dir}" output -raw bucket_name 2>/dev/null)"
            if [ -n "${bn}" ]; then
              [ -z "${GCP_STORAGE_BUCKET}" ] && GCP_STORAGE_BUCKET="${bn}"
              if [ -z "${GCP_STORAGE_BUCKETS}" ]; then
                GCP_STORAGE_BUCKETS="${bn}"
              else
                GCP_STORAGE_BUCKETS="${GCP_STORAGE_BUCKETS},${bn}"
              fi
            fi
          done
          set -e

          VPC_NAME=""
          SUBNET_NAME=""
          set +e
          for vpc_dir in infra/gcp-vpc/*/; do
            [ -d "${vpc_dir}" ] || continue
            [ -f "${vpc_dir}main.tf" ] || continue
            echo "Collecting VPC outputs from ${vpc_dir}"
            terraform -chdir="${vpc_dir}" init -input=false \
              -backend-config="bucket=${TF_STATE_BUCKET}" \
              -backend-config="prefix=${vpc_dir%/}" >/dev/null 2>&1
            VPC_NAME="$(terraform -chdir="${vpc_dir}" output -raw vpc_name 2>/dev/null || true)"
            SUBNET_NAME="$(terraform -chdir="${vpc_dir}" output -raw subnet_name 2>/dev/null || true)"
            [ -n "${VPC_NAME}" ] && break
          done
          set -e

          # Write valid YAML (no accidental leading indent from workflow block scalars)
          {
            printf '%s\n' \
              'apiVersion: v1' \
              'kind: ConfigMap' \
              'metadata:' \
              '  name: platform-runtime-config' \
              'data:'
            printf '  GCP_STORAGE_BUCKET: "%s"\n' "${GCP_STORAGE_BUCKET}"
            printf '  GCP_STORAGE_BUCKETS: "%s"\n' "${GCP_STORAGE_BUCKETS}"
            printf '  GCP_VPC_NAME: "%s"\n' "${VPC_NAME}"
            printf '  GCP_SUBNET_NAME: "%s"\n' "${SUBNET_NAME}"
          } > gitops/base/platform-runtime-config.yaml

          # One ConfigMap per bucket so names appear as nodes in the Argo CD tree (GitOps syncs this).
          {
            echo "# Auto-generated by .github/workflows/infra-terraform.yml — do not edit by hand."
            if [ -z "${GCP_STORAGE_BUCKETS}" ]; then
              cat <<'STUB'
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gcp-buckets-not-provisioned
  labels:
    platform.dev/provisioned: gcp-storage
data:
  message: "No GCS buckets in Terraform outputs yet — fix stacks under infra/gcp-storage/."
STUB
            else
              while IFS= read -r bn; do
                bn="$(echo "$bn" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
                [ -z "${bn}" ] && continue
                safe="$(echo "${bn}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g')"
                cat <<EOF
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gcp-bucket-${safe}
  labels:
    platform.dev/provisioned: gcp-storage
data:
  bucket_name: "${bn}"
EOF
              done <<< "$(echo "${GCP_STORAGE_BUCKETS}" | tr ',' '\n')"
            fi
          } > gitops/base/gcp-bucket-nodes.yaml

          # Argo CD Application summary panel (top of app page).
          python3 -m pip install --user --quiet pyyaml
          export GCP_STORAGE_BUCKETS VPC_NAME SUBNET_NAME
          python3 <<'PY'
          import os, yaml

          def nz(v: str) -> str:
              return v if v else "-"

          with open("argocd/dev-app.yaml") as f:
              doc = yaml.safe_load(f)
          doc.setdefault("spec", {})["info"] = [
              {"name": "GCP buckets (Terraform)", "value": nz(os.environ.get("GCP_STORAGE_BUCKETS", ""))},
              {"name": "GCP VPC", "value": nz(os.environ.get("VPC_NAME", ""))},
              {"name": "GCP subnet", "value": nz(os.environ.get("SUBNET_NAME", ""))},
          ]
          with open("argocd/dev-app.yaml", "w") as f:
              yaml.dump(doc, f, default_flow_style=False, sort_keys=False, width=120, allow_unicode=True)
          PY

      - name: Commit runtime config for ArgoCD sync
        run: |
          set -euo pipefail
          git add gitops/base/platform-runtime-config.yaml gitops/base/gcp-bucket-nodes.yaml argocd/dev-app.yaml
          if git diff --cached --quiet; then
            echo "No infra/gitops changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync infra outputs to gitops (runtime config + Argo bucket visibility)"
          git push
