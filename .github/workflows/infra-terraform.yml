name: Infra Terraform

on:
  pull_request:
    paths:
      - "infra/**/*.tf"
  push:
    branches:
      - main
    paths:
      - "infra/**/*.tf"
  workflow_dispatch:

env:
  GCP_PROJECT_ID: chennu-platform
  GCP_REGION: us-central1
  TF_STATE_BUCKET: chennu-platform-tf-state

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Ensure Terraform state bucket exists
        run: |
          gcloud storage buckets describe "gs://${TF_STATE_BUCKET}" --project "${GCP_PROJECT_ID}" >/dev/null 2>&1 || \
          gcloud storage buckets create "gs://${TF_STATE_BUCKET}" \
            --project "${GCP_PROJECT_ID}" \
            --location "${GCP_REGION}" \
            --uniform-bucket-level-access

      - name: Terraform plan for changed infra directories
        run: |
          set -euo pipefail
          mapfile -t TF_DIRS < <(git diff --name-only "origin/${{ github.base_ref }}...HEAD" | awk '/^infra\/.*\.tf$/ {sub(/\/[^/]+$/, "", $0); print}' | sort -u)
          if [ "${#TF_DIRS[@]}" -eq 0 ]; then
            echo "No changed Terraform directories in infra/."
            exit 0
          fi
          for dir in "${TF_DIRS[@]}"; do
            echo "Planning ${dir}"
            terraform -chdir="${dir}" init -input=false \
              -backend-config="bucket=${TF_STATE_BUCKET}" \
              -backend-config="prefix=${dir}"
            terraform -chdir="${dir}" validate
            terraform -chdir="${dir}" plan -input=false -no-color
          done

  apply:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Ensure Terraform state bucket exists
        run: |
          gcloud storage buckets describe "gs://${TF_STATE_BUCKET}" --project "${GCP_PROJECT_ID}" >/dev/null 2>&1 || \
          gcloud storage buckets create "gs://${TF_STATE_BUCKET}" \
            --project "${GCP_PROJECT_ID}" \
            --location "${GCP_REGION}" \
            --uniform-bucket-level-access

      - name: Terraform apply for changed infra directories
        run: |
          set -euo pipefail
          STORAGE_BUCKET=""
          VPC_NAME=""
          SUBNET_NAME=""
          BEFORE_SHA="${{ github.event.before }}"
          if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            BEFORE_SHA="$(git rev-list --max-count=1 HEAD^)"
          fi
          mapfile -t TF_DIRS < <(git diff --name-only "${BEFORE_SHA}" "${GITHUB_SHA}" | awk '/^infra\/.*\.tf$/ {sub(/\/[^/]+$/, "", $0); print}' | sort -u)
          if [ "${#TF_DIRS[@]}" -eq 0 ]; then
            echo "No changed Terraform directories in infra/."
            exit 0
          fi
          for dir in "${TF_DIRS[@]}"; do
            echo "Applying ${dir}"
            terraform -chdir="${dir}" init -input=false \
              -backend-config="bucket=${TF_STATE_BUCKET}" \
              -backend-config="prefix=${dir}"
            terraform -chdir="${dir}" apply -input=false -auto-approve

            if [[ "${dir}" == infra/gcp-storage/* ]]; then
              STORAGE_BUCKET="$(terraform -chdir="${dir}" output -raw bucket_name)"
            fi
            if [[ "${dir}" == infra/gcp-vpc/* ]]; then
              VPC_NAME="$(terraform -chdir="${dir}" output -raw vpc_name)"
              SUBNET_NAME="$(terraform -chdir="${dir}" output -raw subnet_name)"
            fi
          done

          cat > gitops/base/platform-runtime-config.yaml <<EOF
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: platform-runtime-config
          data:
            GCP_STORAGE_BUCKET: "${STORAGE_BUCKET}"
            GCP_VPC_NAME: "${VPC_NAME}"
            GCP_SUBNET_NAME: "${SUBNET_NAME}"
          EOF

      - name: Commit runtime config for ArgoCD sync
        run: |
          set -euo pipefail
          if git diff --quiet -- gitops/base/platform-runtime-config.yaml; then
            echo "No runtime config changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/base/platform-runtime-config.yaml
          git commit -m "chore: sync infra outputs to gitops runtime config"
          git push
